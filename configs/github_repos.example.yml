# Manifest for scripts/fetch_github_dataset.py.
#
# 'discover' generates this file; you can also write it by hand. Only 'repo', 'id',
# 'ref' and 'subdir' are read -- 'stars', 'license', 'source_files' and 'languages'
# are informational, so you can eyeball the list before fetching.
#
#   python scripts/fetch_github_dataset.py fetch --manifest configs/github_repos.yml
version: 1

repositories:
  # Minimal entry: fetches the current default-branch commit.
  - id: repo_019_httpx
    repo: encode/httpx

  # Pinned commit -- what 'discover' writes. The sha lands in repo.yml as
  # repository.revision, so a re-fetch reproduces byte-identical code.
  - id: repo_020_click
    repo: pallets/click
    ref: 4a0e4b1e2f8a4b3c9d8e7f6a5b4c3d2e1f0a9b8c
    stars: 15800
    license: BSD-3-Clause
    source_files: 44
    languages:
      - python

  # 'subdir' takes one package out of a monorepo and re-roots it in code/:
  # src/foo/bar.py is written as code/foo/bar.py.
  - id: repo_021_lerna_core
    repo: lerna/lerna
    subdir: packages/core
