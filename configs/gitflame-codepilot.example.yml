version: 1

repository:
  default_branch: main
  target_branch_prefix: ai/

analysis:
  enabled: true
  include:
    - backend/**
    - frontend/**
    - src/**
    - internal/**
  exclude:
    - node_modules/**
    - dist/**
    - build/**
    - .git/**
    - vendor/**
    - "*.lock"

code_generation:
  enabled: true
  require_user_approval: true
  reviewer_policy: issue_author

recommendations:
  enabled: true
  severity_threshold: medium
  categories:
    - security
    - maintainability
    - performance
    - architecture
    - code_duplication

context:
  max_files: 20
  max_file_size_kb: 120
  max_snippets_per_file: 3
  snippet_radius_lines: 20
  external_rag:
    enabled: true
    timeout_ms: 8000
    fallback: simple_file_filtering

# Cross-encoder reranking stage applied after RRF (Sprint 2). All keys are optional;
# omitted values fall back to the RerankerConfig defaults in schemas.py.
reranker:
  enabled: true
  model: BAAI/bge-reranker-v2-m3  # 8192-token window; alt (lighter, 512): cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cpu
  batch_size: 16
  reranker_top_k: 50   # size of the RRF candidate pool fed to the reranker
  final_top_k: 10      # number of final evidence chunks returned
  max_pair_chars: 8000 # let the model's token window truncate a chunk, not this char cut

storage:
  recommendation_ttl_days: 30
