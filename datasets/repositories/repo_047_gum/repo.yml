version: 1
repository:
  name: gum
  full_name: charmbracelet/gum
  url: https://github.com/charmbracelet/gum
  default_branch: main
  revision: 716d8b5d0221558f944b5a078dbbcca8572534fb
  license: MIT
  stars: 24026
  language_priority:
  - go
  - shell
  - javascript
  - python
  - ruby
analysis:
  enabled: true
  include:
  - '*.go'
  - choose/**
  - completion/**
  - confirm/**
  - cursor/**
  - examples/**
  - file/**
  - filter/**
  - format/**
  - input/**
  - internal/**
  - join/**
  - log/**
  - man/**
  - pager/**
  - spin/**
  - style/**
  - table/**
  - version/**
  - write/**
  exclude:
  - '**/.*/**'
  - '**/node_modules/**'
  - '**/vendor/**'
  - '**/third_party/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/target/**'
  - '**/.git/**'
  - '**/__pycache__/**'
  - '**/site-packages/**'
  - '**/.venv/**'
  - '*.min.js'
  - '*.min.css'
  - '*.lock'
  - '*_pb2.py'
  - '*_pb2_grpc.py'
  - '*.pb.go'
issues:
  source: github
  format: github_issue
  fields:
  - title
  - body
  - labels
  - expected_files
chunking:
  strategy: ast_aware
  fallback_strategy: fixed_window
  max_chunk_lines: 80
  overlap_lines: 10
  include_metadata: true
ast_grep:
  enabled: true
  extract_symbols: true
  extract_imports: true
  extract_handlers: true
  extract_tests: true
retrieval:
  top_k: 10
  use_bm25: true
  use_dense: true
  use_ast_candidates: true
  fusion_method: rrf
embeddings:
  model: server_controlled
  normalize_vectors: true
  batch_size: 32
storage:
  store_chunks: true
  store_embeddings: true
  store_retrieval_runs: true
evaluation:
  metrics:
  - precision_at_k
  - recall_at_k
  - mrr
  - ndcg_at_k
