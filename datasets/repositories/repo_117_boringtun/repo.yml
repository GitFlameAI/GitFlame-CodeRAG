version: 1
repository:
  name: boringtun
  full_name: cloudflare/boringtun
  url: https://github.com/cloudflare/boringtun
  default_branch: master
  revision: 6dcc889a95ad82400932f785d874421d70308195
  license: BSD-3-Clause
  stars: 7137
  language_priority:
  - rust
  - c
analysis:
  enabled: true
  include:
  - boringtun-cli/**
  - boringtun/**
  exclude:
  - '**/.*/**'
  - '**/node_modules/**'
  - '**/vendor/**'
  - '**/third_party/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/target/**'
  - '**/.git/**'
  - '**/__pycache__/**'
  - '**/site-packages/**'
  - '**/.venv/**'
  - '*.min.js'
  - '*.min.css'
  - '*.lock'
  - '*_pb2.py'
  - '*_pb2_grpc.py'
  - '*.pb.go'
issues:
  source: github
  format: github_issue
  fields:
  - title
  - body
  - labels
  - expected_files
chunking:
  strategy: ast_aware
  fallback_strategy: fixed_window
  max_chunk_lines: 80
  overlap_lines: 10
  include_metadata: true
ast_grep:
  enabled: true
  extract_symbols: true
  extract_imports: true
  extract_handlers: true
  extract_tests: true
retrieval:
  top_k: 10
  use_bm25: true
  use_dense: true
  use_ast_candidates: true
  fusion_method: rrf
embeddings:
  model: server_controlled
  normalize_vectors: true
  batch_size: 32
storage:
  store_chunks: true
  store_embeddings: true
  store_retrieval_runs: true
evaluation:
  metrics:
  - precision_at_k
  - recall_at_k
  - mrr
  - ndcg_at_k
